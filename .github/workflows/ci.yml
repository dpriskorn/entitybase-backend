name: CI Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install poetry
        run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'poetry'
      - run: pip install --upgrade pip wheel
      - run: poetry install --with=dev
      - run: poetry run ruff check src/ tests/
      - run: poetry run mypy src/
      - run: poetry run radon cc -a -s src/

  test-unit:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build docker images
        run: |
          docker compose -f docker-compose.ci.yml build \
            api idworker integration create-buckets create-tables
      - name: Start infrastructure services
        run: |
          docker compose -f docker-compose.ci.yml up -d mysql minio redpanda
      - name: Wait for MySQL
        timeout-minutes: 2
        run: |
          until docker compose -f docker-compose.ci.yml exec -T mysql mysqladmin ping -h localhost --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done
      - name: Wait for MinIO
        timeout-minutes: 2
        run: |
          until curl -f http://localhost:9000/minio/health/live; do
            echo "Waiting for MinIO..."
            sleep 2
          done
      - name: Wait for Redpanda
        timeout-minutes: 2
        run: |
          until docker compose -f docker-compose.ci.yml exec -T redpanda rpk cluster health 2>/dev/null | grep -q 'Healthy'; do
            echo "Waiting for Redpanda..."
            sleep 2
          done
      - name: Setup database tables
        run: docker compose -f docker-compose.ci.yml run --rm create-tables
      - name: Setup S3 buckets
        run: docker compose -f docker-compose.ci.yml run --rm create-buckets
      - name: Start idworker
        run: docker compose -f docker-compose.ci.yml up -d idworker
      - name: Start API
        run: docker compose -f docker-compose.ci.yml up -d api
        timeout-minutes: 2
      - name: Wait for API
        timeout-minutes: 2
        run: |
          until curl -f http://localhost:8000/health; do
            echo "Waiting for API..."
            sleep 2
          done
      - name: Run unit tests
        run: docker compose -f docker-compose.ci.yml run --rm integration pytest tests/unit -v --tb=short
        timeout-minutes: 15
      - name: Down containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  test-e2e:
    needs: test-unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build docker images
        run: |
          docker compose -f docker-compose.ci.yml build \
            api idworker e2e create-buckets create-tables
      - name: Start infrastructure services
        run: |
          docker compose -f docker-compose.ci.yml up -d mysql minio redpanda
      - name: Wait for MySQL
        timeout-minutes: 2
        run: |
          until docker compose -f docker-compose.ci.yml exec -T mysql mysqladmin ping -h localhost --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done
      - name: Wait for MinIO
        timeout-minutes: 2
        run: |
          until curl -f http://localhost:9000/minio/health/live; do
            echo "Waiting for MinIO..."
            sleep 2
          done
      - name: Wait for Redpanda
        timeout-minutes: 2
        run: |
          until docker compose -f docker-compose.ci.yml exec -T redpanda rpk cluster health 2>/dev/null | grep -q 'Healthy'; do
            echo "Waiting for Redpanda..."
            sleep 2
          done
      - name: Setup database tables
        run: docker compose -f docker-compose.ci.yml run --rm create-tables
      - name: Setup S3 buckets
        run: docker compose -f docker-compose.ci.yml run --rm create-buckets
      - name: Start idworker
        run: docker compose -f docker-compose.ci.yml up -d idworker
      - name: Start API
        run: docker compose -f docker-compose.ci.yml up -d api
        timeout-minutes: 2
      - name: Wait for API
        timeout-minutes: 2
        run: |
          until curl -f http://localhost:8000/health; do
            echo "Waiting for API..."
            sleep 2
          done
      - name: Run e2e tests
        run: docker compose -f docker-compose.ci.yml run --rm e2e pytest tests/e2e -v --tb=short
        timeout-minutes: 15
      - name: Down containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  test-contract:
    needs: test-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build docker images
        run: |
          docker compose -f docker-compose.ci.yml build \
            api idworker integration create-buckets create-tables
      - name: Start infrastructure services
        run: |
          docker compose -f docker-compose.ci.yml up -d mysql minio redpanda
      - name: Wait for MySQL
        timeout-minutes: 2
        run: |
          until docker compose -f docker-compose.ci.yml exec -T mysql mysqladmin ping -h localhost --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done
      - name: Wait for MinIO
        timeout-minutes: 2
        run: |
          until curl -f http://localhost:9000/minio/health/live; do
            echo "Waiting for MinIO..."
            sleep 2
          done
      - name: Wait for Redpanda
        timeout-minutes: 2
        run: |
          until docker compose -f docker-compose.ci.yml exec -T redpanda rpk cluster health 2>/dev/null | grep -q 'Healthy'; do
            echo "Waiting for Redpanda..."
            sleep 2
          done
      - name: Setup database tables
        run: docker compose -f docker-compose.ci.yml run --rm create-tables
      - name: Setup S3 buckets
        run: docker compose -f docker-compose.ci.yml run --rm create-buckets
      - name: Start idworker
        run: docker compose -f docker-compose.ci.yml up -d idworker
      - name: Start API
        run: docker compose -f docker-compose.ci.yml up -d api
        timeout-minutes: 2
      - name: Wait for API
        timeout-minutes: 2
        run: |
          until curl -f http://localhost:8000/health; do
            echo "Waiting for API..."
            sleep 2
          done
      - name: Run contract tests
        run: docker compose -f docker-compose.ci.yml run --rm integration pytest tests/contract -v --tb=short
        timeout-minutes: 10
      - name: Down containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  test-integration:
    needs: test-contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build docker images
        run: |
          docker compose -f docker-compose.ci.yml build \
            api idworker integration create-buckets create-tables
      - name: Start infrastructure services
        run: |
          docker compose -f docker-compose.ci.yml up -d mysql minio redpanda
      - name: Wait for MySQL
        timeout-minutes: 2
        run: |
          until docker compose -f docker-compose.ci.yml exec -T mysql mysqladmin ping -h localhost --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done
      - name: Wait for MinIO
        timeout-minutes: 2
        run: |
          until curl -f http://localhost:9000/minio/health/live; do
            echo "Waiting for MinIO..."
            sleep 2
          done
      - name: Wait for Redpanda
        timeout-minutes: 2
        run: |
          until docker compose -f docker-compose.ci.yml exec -T redpanda rpk cluster health 2>/dev/null | grep -q 'Healthy'; do
            echo "Waiting for Redpanda..."
            sleep 2
          done
      - name: Setup database tables
        run: docker compose -f docker-compose.ci.yml run --rm create-tables
      - name: Setup S3 buckets
        run: docker compose -f docker-compose.ci.yml run --rm create-buckets
      - name: Start idworker
        run: docker compose -f docker-compose.ci.yml up -d idworker
      - name: Start API
        run: docker compose -f docker-compose.ci.yml up -d api
        timeout-minutes: 2
      - name: Wait for API
        timeout-minutes: 2
        run: |
          until curl -f http://localhost:8000/health; do
            echo "Waiting for API..."
            sleep 2
          done
      - name: Run integration tests
        run: docker compose -f docker-compose.ci.yml run --rm integration pytest tests/integration -v --tb=short
        timeout-minutes: 25
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            pytest-report.html
            pytest-report.json
            .coverage
            coverage.xml
          if-no-files-found: ignore
      - name: Show container logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.ci.yml logs --tail=100 mysql
          docker compose -f docker-compose.ci.yml logs --tail=100 api
      - name: Down containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
