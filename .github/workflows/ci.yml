name: CI Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # TEMPORARILY DISABLED JOBS - lint and test
  # (See previous commits for full lint and test job definitions)

  total-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install poetry
        run: pipx install poetry
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'poetry'
      - run: pip install --upgrade pip wheel
      - run: poetry install --with=dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build docker images
        run: |
          docker compose -f docker-compose.ci.yml build \
            api idworker create-buckets create-tables
      - name: Start infrastructure services
        run: |
          docker compose -f docker-compose.ci.yml up -d mysql minio redpanda
      - name: Wait for MySQL
        timeout-minutes: 2
        run: |
          until docker compose -f docker-compose.ci.yml exec -T mysql mysqladmin ping -h localhost --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done
      - name: Wait for MinIO
        timeout-minutes: 2
        run: |
          until curl -f http://localhost:9000/minio/health/live; do
            echo "Waiting for MinIO..."
            sleep 2
          done
      - name: Wait for Redpanda
        timeout-minutes: 2
        run: |
          until docker compose -f docker-compose.ci.yml exec -T redpanda rpk cluster health 2>/dev/null | grep -q 'Healthy'; do
            echo "Waiting for Redpanda..."
            sleep 2
          done
      - name: Setup database tables
        run: docker compose -f docker-compose.ci.yml run --rm create-tables
      - name: Setup S3 buckets
        run: docker compose -f docker-compose.ci.yml run --rm create-buckets
      - name: Start idworker
        run: docker compose -f docker-compose.ci.yml up -d idworker
      - name: Start API
        run: docker compose -f docker-compose.ci.yml up -d api
        timeout-minutes: 2
      - name: Wait for API
        timeout-minutes: 2
        run: |
          until curl -f http://localhost:8000/health; do
            echo "Waiting for API..."
            sleep 2
          done

      - name: Run all tests with total coverage
        env:
          VITESS_HOST: localhost
          VITESS_PORT: 3306
          VITESS_DATABASE: entitybase
          VITESS_USER: root
          VITESS_PASSWORD: ""
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: fakekey
          S3_SECRET_KEY: fakesecret
          S3_BUCKET: testbucket
          REST_API_URL: http://localhost:8000
          STREAMING_ENABLED: "false"
        run: poetry run pytest tests/ -v --cov=src --cov-report=xml --cov-report=term
        timeout-minutes: 15

      - name: Upload total coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: total
          name: total-coverage

      - name: Down containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
